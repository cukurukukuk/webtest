<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Routine Tracker</title>
    <!-- Tailwind CSS Play CDN untuk styling cepat & modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS File -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Google (Inter & Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome untuk icon-icon menarik -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="text-slate-200 min-h-screen py-10 px-4 md:px-0">

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-emerald-400 tracking-wide mb-2">DAILY ROUTINE TRACKER</h1>
            <p class="text-slate-400 text-sm md:text-base">"Discipline equals freedom. Keep pushing your limits!"</p>
            <div id="current-time-display" class="mt-4 text-lg font-semibold text-slate-300 bg-slate-800/50 inline-block px-4 py-2 rounded-full border border-slate-700">
                <i class="fa-regular fa-clock text-emerald-400 mr-2"></i><span id="live-clock">00:00:00</span>
            </div>
        </header>

        <!-- DAFTAR RUTINITAS -->
        <main class="space-y-6" id="routine-container">
            <!-- Data list akan digenerate otomatis oleh script.js -->
        </main>

        <!-- FOOTER -->
        <footer class="text-center mt-12 text-xs text-slate-500 border-t border-slate-800 pt-6">
            <p>© 2026 • Designed for Modern Developers & Bug Hunters</p>
            <p class="mt-1">Built with HTML, Tailwind CSS & Vanilla JS</p>
        </footer>
    </div>

    <!-- Custom JS File -->
    <script src="script.js"></script>
</body>
</html>
